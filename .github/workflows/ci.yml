name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Run unit tests
        run: ./gradlew :desktop:desktopTest --tests "app.podiumpodcasts.podium.desktop.VlcjMediaPlayerTest" --tests "app.podiumpodcasts.podium.desktop.ExportManagerTest" --tests "app.podiumpodcasts.podium.desktop.PodcastManagerTest" --tests "app.podiumpodcasts.podium.desktop.DownloadManagerTest" --tests "app.podiumpodcasts.podium.desktop.ImportManagerTest" --tests "app.podiumpodcasts.podium.desktop.MediaPlayerStateTest" --tests "app.podiumpodcasts.podium.desktop.HistoryDaoTest"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: unit-test-results
          path: desktop/build/reports/tests/

  gui-tests:
    name: GUI Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Run GUI tests
        run: ./gradlew :desktop:desktopTest --tests "app.podiumpodcasts.podium.desktop.AppGUITest" --tests "app.podiumpodcasts.podium.desktop.DiscoverScreenTest" --tests "app.podiumpodcasts.podium.desktop.HistoryScreenTest" --tests "app.podiumpodcasts.podium.desktop.SettingsScreenTest"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: gui-test-results
          path: desktop/build/reports/tests/

  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build desktop module
        run: ./gradlew :desktop:compileKotlinDesktop
